<!DOCTYPE html>
<html>

<head>

<title>BNB AI Price Predictor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="header">
<h1>BNB AI Trading Dashboard</h1>
<p>Machine Learning Crypto Prediction</p>
</div>

<div class="container">

<div class="card">

<h2>Market Inputs</h2>

<input id="open" placeholder="Open Price">

<input id="high" placeholder="High Price">

<input id="low" placeholder="Low Price">

<input id="volume" placeholder="Volume">

<button onclick="predict()">Predict Price</button>

</div>

<div class="card">

<h2>Prediction Result</h2>

<h3 id="prediction">Waiting for prediction...</h3>

<div id="signal-box">

<h2>AI Trading Signal</h2>

<div id="signal-indicator">WAITING...</div>

</div>

</div>

</div>

<div class="chart-container">

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
